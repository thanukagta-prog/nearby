<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>More Services - Enhance App Functionality</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
    <style>
        .services-header {
            background-color: var(--bg-white);
            color: var(--text-dark);
            padding: 24px 16px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .services-header .header-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .services-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .services-header-icon {
            font-size: 1.25rem;
            color: var(--text-dark);
            text-decoration: none;
        }

        .all-services-container {
            padding: 16px;
            padding-bottom: 100px;
            /* Space for bottom nav */
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="services-header">
        <div class="header-inner">
            <a href="index.html" class="services-header-icon"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>All Services</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="all-services-container">

        <div class="featured-list" id="allFeaturedServices">
            <!-- Dynamically populated from data.js -->
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="orders.html" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>Orders</span>
        </a>
        <a href="add_business.html" class="nav-item">
            <i class="fa-solid fa-plus-circle"></i>
            <span>Add Business</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('allFeaturedServices');
            if (container && window.appData && window.appData.featuredServices) {
                let html = '';

                // Shuffle featured services a bit for variety or just map them out
                [...window.appData.featuredServices].forEach(srv => {
                    html += `
                    <a href="service_detail.html?id=${srv.id}" class="service-card card">
                        <div class="service-image-placeholder" style="background-color: var(--bg-light); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--icon-bg-gray);">
                            <img src="${srv.image}" alt="${srv.title}" style="width: 100%; height: 100%; object-fit: cover; display: block;">
                        </div>
                        <div class="service-info">
                            <div class="service-header">
                                <h4>${srv.title}</h4>
                                <div class="rating-badge">
                                    <i class="fa-solid fa-star"></i> ${srv.rating}
                                </div>
                            </div>
                            <p class="service-type">${srv.categoryName || 'Service'}</p>
                            <div class="availability">
                                <span class="dot" style="background: ${srv.colorInfo.text};"></span> ${srv.availability}
                            </div>
                        </div>
                    </a>
                    `;
                });

                container.innerHTML = html;
            }
        });
    </script>
</body>

</html>
