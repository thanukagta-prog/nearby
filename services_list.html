<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Services List - Nearby</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
    <style>
        /* Modern styles for rich aesthetics */
        .service-list-header {
            background: linear-gradient(135deg, var(--primary-color, #2563eb), #1e40af);
            color: white;
            padding: 24px 16px;
            padding-top: max(24px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .header-title-group {
            flex-grow: 1;
        }

        .header-title-group h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .header-title-group p {
            font-size: 0.85rem;
            margin: 4px 0 0 0;
            opacity: 0.9;
        }

        .services-container {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 100px;
        }

        .service-card-modern {
            background: var(--bg-white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: row;
            /* Horizontal layout */
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .service-card-modern:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .service-img-wrapper {
            width: 120px;
            min-width: 120px;
            position: relative;
        }

        .service-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .service-category-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary-color, #2563eb);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .service-content-modern {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .service-title-modern {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            color: var(--text-dark);
        }

        .service-provider-modern {
            font-size: 0.8rem;
            color: var(--text-light);
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .service-meta-modern {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
        }

        .rating-price-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .rating-modern {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .rating-modern i {
            color: #f59e0b;
        }

        .price-modern {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-color, #2563eb);
        }

        .availability-badge {
            background: #ecfdf5;
            color: #059669;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .availability-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: #d1d5db;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="service-list-header">
        <button class="back-btn" onclick="history.back()" aria-label="Go back">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="header-title-group">
            <h1 id="pageTitle">Services</h1>
            <p id="pageSubtitle">Find the best services</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="services-container" id="servicesContainer">
        <!-- Loader during generation -->
        <div style="text-align: center; padding: 40px; color: #6b7280;">
            <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
            <p style="margin-top: 10px;">Loading services...</p>
        </div>
    </main>

    <!-- Data generation script -->
    <script src="data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const categoryKey = urlParams.get('category');

            const container = document.getElementById('servicesContainer');
            const pageTitle = document.getElementById('pageTitle');
            const pageSubtitle = document.getElementById('pageSubtitle');

            if (!categoryKey || !window.appData || !window.appData.services[categoryKey]) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-magnifying-glass-error"></i>
                        <h3>Category Not Found</h3>
                        <p>We couldn't find any services for this category.</p>
                        <a href="index.html" class="btn" style="margin-top: 16px; display: inline-block; padding: 10px 20px; background: var(--primary-color, #2563eb); color: white; border-radius: 8px; text-decoration: none;">Go Home</a>
                    </div>
                `;
                return;
            }

            const categoryInfo = window.appData.subcategories[categoryKey];
            const servicesList = window.appData.services[categoryKey];
            const colorInfo = window.appData.categoryColors[categoryInfo.parent] || { bg: '#2563eb', text: '#ffffff', gradient: 'linear-gradient(135deg, #2563eb, #1e40af)' };

            // Update Header and apply dynamic colors
            const header = document.querySelector('.service-list-header');
            if (header) {
                header.style.background = colorInfo.gradient;
            }

            pageTitle.textContent = categoryInfo.name;
            pageSubtitle.textContent = `Found ${servicesList.length} services nearby`;

            // Render Services
            container.innerHTML = ''; // clear loader

            servicesList.forEach(srv => {
                const card = document.createElement('a');
                card.href = `service_detail.html?id=${srv.id}`;
                card.className = 'service-card-modern';

                card.innerHTML = `
                    <div style="width: 100px; min-width: 100px; overflow: hidden; background-color: var(--bg-light); border-right: 1px solid var(--icon-bg-gray);">
                        <img src="${srv.image}" alt="${srv.title}" style="width: 100%; height: 100%; object-fit: cover; display: block;">
                    </div>
                    <div class="service-content-modern">
                        <div>
                            <h3 class="service-title-modern">${srv.title}</h3>
                            <div class="service-provider-modern">
                                <i class="fa-solid fa-certificate" style="color: ${colorInfo.text};"></i>
                                Professional Service
                            </div>
                        </div>
                        <div class="service-meta-modern">
                            <div class="rating-price-group">
                                <span class="rating-modern"><i class="fa-solid fa-star"></i> ${srv.rating}</span>
                                <span class="price-modern" style="color: ${colorInfo.text};">${srv.price}</span>
                            </div>
                            <div class="availability-badge">
                                <span class="dot" style="background: ${colorInfo.text};"></span> <span style="color: ${colorInfo.text};">${srv.availability}</span>
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });

            // Add a little smooth stagger animation
            const cards = container.querySelectorAll('.service-card-modern');
            cards.forEach((c, idx) => {
                c.style.opacity = '0';
                c.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    c.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                    c.style.opacity = '1';
                    c.style.transform = 'translateY(0)';
                }, 50 * idx);
            });
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
