<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Business - Enhance App Functionality</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="add_business.css">
</head>

<body>

    <!-- Header -->
    <header class="top-header">
        <h1>Add Your Business</h1>
        <p style="font-size: 0.875rem; opacity: 0.9; margin-top: 4px;">Join Nearby and grow your customer base</p>
    </header>

    <!-- Main Content -->
    <main class="main-content">

        <form class="business-form" onsubmit="event.preventDefault(); document.getElementById('successModal').classList.add('show');"
            style="margin-bottom: 24px;">

            <div class="form-group card">

                <!-- Business Name -->
                <div class="input-container">
                    <label>Business Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-store input-icon"></i>
                        <input type="text" placeholder="Enter business name" required>
                    </div>
                </div>

                <!-- Service Category -->
                <div class="input-container mt-16">
                    <label>Service Category</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-list input-icon"></i>

                        <div class="custom-category-wrapper">
                            <button type="button" class="category-select-btn" id="categoryBtn">
                                <span id="selectedCategory" class="placeholder">Select category</span>
                                <i class="fa-solid fa-chevron-down select-arrow"></i>
                            </button>

                            <!-- Custom Dropdown Menu -->
                            <div class="custom-dropdown-menu" id="categoryMenu">
                                <button type="button" class="dropdown-item" data-val="health">Health & Pharmacy</button>
                                <button type="button" class="dropdown-item" data-val="automotive">Automotive &
                                    Fuel</button>
                                <button type="button" class="dropdown-item" data-val="home">Home & Utilities</button>
                                <button type="button" class="dropdown-item" data-val="retail">Retail &
                                    Essentials</button>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- Phone Number -->
                <div class="input-container mt-16">
                    <label>Phone Number</label>
                    <div class="input-wrapper phone-wrapper">
                        <span class="country-code">+94</span>
                        <input type="tel" placeholder="7X XXX XXXX" required>
                    </div>
                </div>

            </div>

            <!-- Additional Details Card -->
            <div class="form-group card">

                <!-- Business Address -->
                <div class="input-container">
                    <label>Business Address</label>
                    <div class="input-wrapper textarea-wrapper">
                        <i class="fa-solid fa-location-dot input-icon align-top"></i>
                        <textarea placeholder="Enter full address" rows="2" required></textarea>
                    </div>
                </div>

                <!-- Working Hours -->
                <div class="input-container mt-16">
                    <label>Working Hours</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-clock input-icon"></i>
                        <input type="text" placeholder="e.g. 09:00 AM - 05:00 PM" required>
                    </div>
                </div>

                <!-- Starting Price -->
                <div class="input-container mt-16">
                    <label>Starting Price (Optional)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-dollar-sign input-icon"></i>
                        <input type="number" placeholder="0.00">
                    </div>
                </div>

                <!-- Business Description -->
                <div class="input-container mt-16">
                    <label>Business Description</label>
                    <div class="input-wrapper textarea-wrapper">
                        <i class="fa-solid fa-align-left input-icon align-top"></i>
                        <textarea placeholder="Describe your services..." rows="3" required></textarea>
                    </div>
                </div>

            </div>

            <!-- Availability Toggle Card -->
            <div class="card toggle-card">
                <div class="toggle-text">
                    <strong>Available Now</strong>
                    <span>Accept bookings immediately</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-submit">Submit for Review</button>

        </form>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="orders.html" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>Orders</span>
        </a>
        <a href="add_business.html" class="nav-item active">
            <i class="fa-solid fa-plus-circle"></i>
            <span>Add Business</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Post-Submission Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content text-center">
            <div class="modal-icon text-blue">
                <i class="fa-solid fa-clipboard-check" style="font-size: 3rem; margin-bottom: 16px; color: var(--primary-color, #2563eb);"></i>
            </div>
            <h3 class="modal-title" style="margin-bottom: 8px;">Submission Received</h3>
            <p class="modal-text" style="color: var(--text-light); margin-bottom: 24px;">Your submission is subjected to review. Our team will verify your business details and contact you shortly.</p>
            <div class="modal-actions">
                <button class="btn btn-primary modal-btn" onclick="document.getElementById('successModal').classList.remove('show');" style="width: 100%;">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
